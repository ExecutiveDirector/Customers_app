name: aquagas
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Utils
  supabase_flutter: ^2.9.1
  firebase_core: ^3.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  cached_network_image: ^3.4.0
  geolocator: ^13.0.1
  osm_nominatim: ^4.0.1
  app_links: ^3.5.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_analytics: ^11.3.3
  intl: ^0.20.0
  pdf: ^3.11.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  google_places_flutter: ^2.0.9
  flutter_keyboard_visibility: ^6.0.0  # Updated to fix namespace issue
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  go_router: ^16.1.0
  google_maps_flutter: ^2.7.3
  google_sign_in: ^6.2.1
  intl_phone_field: ^3.2.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  geocoding: ^3.0.0
  # geolocator: ^12.0.0
  url_launcher: ^6.3.0
  fl_chart: ^0.69.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pin_code_fields: ^8.0.1
  permission_handler: ^11.3.0
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.2+1
  http: ^1.1.0
  http_parser: ^4.0.2
  mime: ^1.0.4
  flutter_lints: ^4.0.0
  bdd_widget_test: ^1.2.1
  build_runner: ^2.4.13
  equatable: ^2.0.5
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

# ─── App icon (flutter_launcher_icons) ─────────────────────────────────────
# Source image should ideally be 1024x1024 PNG. assets/assets/images/logo.png
# is 348x387 (not square) — usable as a placeholder, but swap in a proper
# square 1024x1024 logo before submitting to the stores if you have one.
# Run: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/assets/images/logo.png"
  remove_alpha_ios: true

# ─── Splash screen (flutter_native_splash) ─────────────────────────────────
# Run: flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/assets/images/logo.png"
  color_dark: "#0F172A"
  image_dark: "assets/assets/images/logo.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/assets/images/logo.png"
    color_dark: "#0F172A"
    image_dark: "assets/assets/images/logo.png"
  android: true
  ios: true
  web: false



flutter:
  uses-material-design: true
  assets:
    - assets/assets/images/logo.png
    - assets/visa_logo.png
    - assets/mastercard_logo.png
    - assets/mpesa_logo.png
    - assets/gas_cylinder_13kg.jpeg
    - assets/gas_cylinder_6kg.jpeg
    - assets/promo_kenya_momo_discount.jpg
    - assets/google_logo.png